<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container {
        width: 320px;
        margin: 80px auto;
        background: #8fb7c3;
        padding: 20px;
        border-radius: 8px;
        text-align: left;
    }

    .container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
    }

    input,
    select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 6px;
        border: none;
        outline: none;
        box-sizing: border-box;
    }

    button {
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        background: #2ea7a0;
        border: 2px solid black;
        color: white;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
    }

    button:hover {
        background: #25918b;
    }

    #ticket {
        width: 260px;
        margin: 20px auto;
    }

    .ticket-card {
        background: #eee;
        padding: 15px;
        border-left: 5px solid green;
        border-radius: 6px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    .ticket-card h4 {
        margin: 0 0 10px 0;
    }
</style>

<body>

    <div class="container">
        <h2>Passenger Info</h2>

        <label>Name</label>
        <input type="text" id="name" placeholder="Your name">

        <label>Age</label>
        <input type="number" id="age" placeholder="Your age">

        <label>From</label>
        <input type="text" id="from" placeholder="Departure city">

        <label>To</label>
        <input type="text" id="to" placeholder="Destination city">

        <label>Train Type</label>
        <select id="train">
            <option>Fast Train</option>
            <option>Regular Train</option>
            <option>Express Train</option>
        </select>

        <button onclick="buyTicket()">Buy Ticket</button>
    </div>

    <div id="ticket"></div>

    <script>

        function buyTicket() {
            const name = document.getElementById("name").value.trim();
            const age = document.getElementById("age").value.trim();
            const from = document.getElementById("from").value.trim();
            const to = document.getElementById("to").value.trim();
            const train = document.getElementById("train").value;

            if (!name || !age || !from || !to) {
                alert("Please fill in all fields.");
                return;
            }

            const ticketDiv = document.getElementById("ticket");

            ticketDiv.innerHTML += `
    <div class="ticket-card">
      <h4>${train}</h4>
      <p><b>Name:</b> ${name}</p>
      <p><b>Age:</b> ${age}</p>
      <p><b>Route:</b> ${from} to ${to}</p>
    </div>
  `;

            document.getElementById("name").value = "";
            document.getElementById("age").value = "";
            document.getElementById("from").value = "";
            document.getElementById("to").value = "";
            document.getElementById("train").selectedIndex = 0;
        }

    </script>
</body>

</html>
